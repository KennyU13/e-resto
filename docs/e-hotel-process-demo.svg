<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">E-Resto Hotel process demo</title>
  <desc id="desc">Demo diagram of the Hotel 3.4 Bonita process workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef7f4"/>
    </linearGradient>
    <linearGradient id="task" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#edf5ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f2b46" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2d5f8b"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="36" y="34" width="1208" height="652" rx="24" fill="#ffffff" stroke="#d6e2ec" filter="url(#shadow)"/>

  <text x="640" y="76" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#18324a">E-Resto Hotel - Process Demo</text>
  <text x="640" y="106" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#5a7084">Bonita process: Hotel 3.4 | Local runtime: http://localhost:29561/</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="72" y="140" width="1136" height="108" rx="14" fill="#f7fbff" stroke="#d7e6f2"/>
    <text x="92" y="170" font-size="15" font-weight="700" fill="#2b5d86">Client</text>
    <circle cx="136" cy="207" r="22" fill="#5aa7e8"/>
    <text x="136" y="213" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Start</text>
    <rect x="198" y="176" width="180" height="62" rx="14" fill="url(#task)" stroke="#69a7d5"/>
    <text x="288" y="202" text-anchor="middle" font-size="14" font-weight="700" fill="#17324b">Reserver chambre</text>
    <text x="288" y="222" text-anchor="middle" font-size="12" fill="#526b7f">categorie, client, nuits</text>
    <rect x="418" y="176" width="190" height="62" rx="14" fill="url(#task)" stroke="#69a7d5"/>
    <text x="513" y="202" text-anchor="middle" font-size="14" font-weight="700" fill="#17324b">Verifier disponibilite</text>
    <text x="513" y="222" text-anchor="middle" font-size="12" fill="#526b7f">chambre propre</text>
    <path d="M158 207 H190" stroke="#2d5f8b" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
    <path d="M378 207 H410" stroke="#2d5f8b" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

    <rect x="72" y="278" width="1136" height="128" rx="14" fill="#fffdf8" stroke="#ead9bd"/>
    <text x="92" y="308" font-size="15" font-weight="700" fill="#946016">Receptionniste</text>
    <polygon points="660,323 696,359 660,395 624,359" fill="#fff7d6" stroke="#d6a23a" stroke-width="2"/>
    <text x="660" y="356" text-anchor="middle" font-size="12" font-weight="700" fill="#64430d">Chambre</text>
    <text x="660" y="373" text-anchor="middle" font-size="12" font-weight="700" fill="#64430d">propre ?</text>
    <rect x="746" y="328" width="170" height="62" rx="14" fill="url(#task)" stroke="#69a7d5"/>
    <text x="831" y="354" text-anchor="middle" font-size="14" font-weight="700" fill="#17324b">Generer facture</text>
    <text x="831" y="374" text-anchor="middle" font-size="12" fill="#526b7f">client, chambre, prix</text>
    <rect x="966" y="328" width="170" height="62" rx="14" fill="url(#task)" stroke="#69a7d5"/>
    <text x="1051" y="354" text-anchor="middle" font-size="14" font-weight="700" fill="#17324b">Encaisser montant</text>
    <text x="1051" y="374" text-anchor="middle" font-size="12" fill="#526b7f">statut: payee</text>
    <path d="M608 207 H660 V315" stroke="#2d5f8b" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
    <path d="M696 359 H738" stroke="#2d5f8b" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
    <path d="M916 359 H958" stroke="#2d5f8b" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
    <text x="716" y="345" font-size="13" font-weight="700" fill="#176234">oui</text>

    <rect x="72" y="436" width="1136" height="98" rx="14" fill="#f8fbff" stroke="#d7e6f2"/>
    <text x="92" y="466" font-size="15" font-weight="700" fill="#2b5d86">Client</text>
    <rect x="966" y="462" width="170" height="52" rx="14" fill="url(#task)" stroke="#69a7d5"/>
    <text x="1051" y="493" text-anchor="middle" font-size="14" font-weight="700" fill="#17324b">Depart client</text>
    <path d="M1051 390 V454" stroke="#2d5f8b" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

    <rect x="72" y="564" width="1136" height="86" rx="14" fill="#fbfff8" stroke="#d8e8ce"/>
    <text x="92" y="594" font-size="15" font-weight="700" fill="#427323">Femme de menage</text>
    <rect x="528" y="582" width="210" height="52" rx="14" fill="url(#task)" stroke="#69a7d5"/>
    <text x="633" y="604" text-anchor="middle" font-size="14" font-weight="700" fill="#17324b">Nettoyer chambre</text>
    <text x="633" y="622" text-anchor="middle" font-size="12" fill="#526b7f">remplacer articles</text>
    <path d="M660 395 V574" stroke="#2d5f8b" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
    <text x="676" y="428" font-size="13" font-weight="700" fill="#8a3417">non</text>
    <path d="M1051 514 V608 H746" stroke="#2d5f8b" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

    <rect x="826" y="582" width="160" height="52" rx="14" fill="url(#task)" stroke="#69a7d5"/>
    <text x="906" y="613" text-anchor="middle" font-size="14" font-weight="700" fill="#17324b">Notifier reception</text>
    <path d="M738 608 H818" stroke="#2d5f8b" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

    <rect x="166" y="582" width="160" height="52" rx="14" fill="url(#task)" stroke="#69a7d5"/>
    <text x="246" y="604" text-anchor="middle" font-size="14" font-weight="700" fill="#17324b">Verifier stock</text>
    <text x="246" y="622" text-anchor="middle" font-size="12" fill="#526b7f">comptable</text>
    <rect x="350" y="582" width="150" height="52" rx="14" fill="url(#task)" stroke="#69a7d5"/>
    <text x="425" y="613" text-anchor="middle" font-size="14" font-weight="700" fill="#17324b">Dashboard</text>
    <path d="M1136 359 H1170 V608 H994" stroke="#2d5f8b" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
    <path d="M326 608 H342" stroke="#2d5f8b" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  </g>
</svg>
